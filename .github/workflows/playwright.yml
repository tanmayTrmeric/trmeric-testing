name: Trmeric E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [develop]
  schedule:
    # Nightly regression at 6:00 AM IST (12:30 AM UTC)
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'qa'
        type: choice
        options: [dev, qa, eu]
      suite:
        description: 'Test suite to run'
        required: true
        default: 'deploy-gate'
        type: choice
        options: [smoke, platform, deploy-gate, full]

env:
  CI: true
  TRMERIC_ENV: ${{ github.event.inputs.environment || 'qa' }}
  TRMERIC_AUTH_TOKEN: ${{ secrets.TRMERIC_AUTH_TOKEN }}
  TRMERIC_BASE_URL: ${{ secrets.TRMERIC_BASE_URL }}

jobs:
  # ── Smoke: Quick health check (blocks merge) ──────────────
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium
      - run: npx playwright test --project=smoke
        env:
          TRMERIC_ENV: qa
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: reports/
          retention-days: 7

  # ── Deploy Gate: Full pre-deployment validation ────────────
  deploy-gate:
    name: Deploy Gate (${{ github.event.inputs.environment || 'qa' }})
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium
      - name: Run deploy gate tests
        run: npx playwright test --project=deploy-gate
      - name: Check deploy verdict
        if: always()
        run: |
          if [ -f reports/${{ env.TRMERIC_ENV }}-deploy-verdict.json ]; then
            VERDICT=$(node -e "const r=require('./reports/${{ env.TRMERIC_ENV }}-deploy-verdict.json'); console.log(r.verdict)")
            echo "Deploy verdict: $VERDICT"
            node -e "const r=require('./reports/${{ env.TRMERIC_ENV }}-deploy-verdict.json'); if(!r.deployable) process.exit(1)"
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deploy-gate-report-${{ env.TRMERIC_ENV }}
          path: reports/
          retention-days: 30

  # ── Full Regression: Nightly comprehensive run ─────────────
  regression:
    name: Full Regression
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install chromium
      - name: Run full regression
        run: npx playwright test --project=smoke --project=platform --project=user-stories
        env:
          TRMERIC_ENV: qa
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-report
          path: reports/
          retention-days: 30
